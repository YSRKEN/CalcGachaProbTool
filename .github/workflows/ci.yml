name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]

jobs:
  angular:
    name: Angular (CalcGachaProbTool)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CalcGachaProbTool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 10
          cache: npm
          cache-dependency-path: CalcGachaProbTool/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test -- --watch=false --browsers=ChromeHeadless --no-progress

  react:
    name: React (gacha-prob-calculator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gacha-prob-calculator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: gacha-prob-calculator/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          CI: false
        run: yarn build

      - name: Test
        run: CI=true yarn test --watchAll=false
