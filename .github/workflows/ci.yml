name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  angular:
    name: Angular (CalcGachaProbTool)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: CalcGachaProbTool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 10
          cache: npm
          cache-dependency-path: CalcGachaProbTool/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  react:
    name: React (gacha-prob-calculator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gacha-prob-calculator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gacha-prob-calculator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          CI: false
        run: npm run build

      - name: Test
        run: npm run test:ci
